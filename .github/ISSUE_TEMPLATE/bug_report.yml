name: Bug report
description: Report a reproducible issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: capture
    attributes:
      label: Capture mode
      placeholder: Tab, Mic, Both, or Sample
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: Chrome on macOS
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Run npm run activate..."
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      description: Do not paste API keys or client secrets.
